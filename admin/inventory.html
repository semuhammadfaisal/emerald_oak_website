<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Inventory - Emerald OAK Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-leaf"></i>
        <h2>Emerald OAK</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="properties.html" class="nav-item">
          <i class="fas fa-building"></i>
          <span>Properties</span>
        </a>
        <a href="projects.html" class="nav-item">
          <i class="fas fa-hammer"></i>
          <span>Projects</span>
        </a>
        <a href="inventory.html" class="nav-item active">
          <i class="fas fa-warehouse"></i>
          <span>Office Inventory</span>
        </a>
        <a href="inquiries.html" class="nav-item">
          <i class="fas fa-envelope"></i>
          <span>Inquiries</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>Office Inventory</h1>
        <button onclick="openAddModal()" class="add-btn">
          <i class="fas fa-plus"></i>
          <span>Add to Inventory</span>
        </button>
      </header>

      <div class="content-area">
        <div class="filters">
          <input type="text" id="searchInput" placeholder="Search by plot, block, society..." class="search-input">
          <select id="typeFilter" class="filter-select">
            <option value="">All Types</option>
            <option value="plot">Plot</option>
            <option value="house">House</option>
          </select>
          <select id="statusFilter" class="filter-select">
            <option value="">All Status</option>
            <option value="available">Available</option>
            <option value="sold">Sold</option>
            <option value="reserved">Reserved</option>
          </select>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>Plot/House #</th>
                <th>Block</th>
                <th>Society</th>
                <th>Size</th>
                <th>Purchase Price</th>
                <th>Selling Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inventoryTable">
              <tr>
                <td colspan="9" class="no-data">No inventory items found</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="inventoryModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h2 id="modalTitle">Add to Inventory</h2>
        <button onclick="closeModal()" class="close-btn">&times;</button>
      </div>
      <form id="inventoryForm" class="modal-form">
        <input type="hidden" id="inventoryId">
        
        <h3 style="color: #134d37; margin-bottom: 15px;">Property Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Type *</label>
            <select id="propertyType" required>
              <option value="">Select Type</option>
              <option value="plot">Plot</option>
              <option value="house">House</option>
            </select>
          </div>
          <div class="form-group">
            <label>Plot/House Number *</label>
            <input type="text" id="plotNumber" required placeholder="e.g., 123">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Block *</label>
            <input type="text" id="block" required placeholder="e.g., F">
          </div>
          <div class="form-group">
            <label>Society *</label>
            <input type="text" id="society" required placeholder="e.g., Multi Garden B-17">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Location *</label>
            <input type="text" id="location" required placeholder="e.g., Islamabad">
          </div>
          <div class="form-group">
            <label>Size *</label>
            <input type="text" id="size" required placeholder="e.g., 5 Marla">
          </div>
        </div>

        <h3 style="color: #134d37; margin: 20px 0 15px;">Financial Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Purchase Price *</label>
            <input type="text" id="purchasePrice" required placeholder="e.g., 50 Lac">
          </div>
          <div class="form-group">
            <label>Selling Price *</label>
            <input type="text" id="sellingPrice" required placeholder="e.g., 60 Lac">
          </div>
        </div>

        <h3 style="color: #134d37; margin: 20px 0 15px;">Owner Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Owner Name</label>
            <input type="text" id="ownerName" placeholder="Owner name">
          </div>
          <div class="form-group">
            <label>Owner Contact</label>
            <input type="text" id="ownerContact" placeholder="0300-1234567">
          </div>
        </div>

        <h3 style="color: #134d37; margin: 20px 0 15px;">Status & Sale Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Status *</label>
            <select id="status" required onchange="toggleSoldFields()">
              <option value="available">Available</option>
              <option value="reserved">Reserved</option>
              <option value="sold">Sold</option>
            </select>
          </div>
          <div class="form-group" id="soldDateGroup" style="display: none;">
            <label>Sold Date</label>
            <input type="date" id="soldDate">
          </div>
        </div>

        <div id="soldDetailsGroup" style="display: none;">
          <div class="form-row">
            <div class="form-group">
              <label>Sold To</label>
              <input type="text" id="soldTo" placeholder="Buyer name">
            </div>
            <div class="form-group">
              <label>Buyer Contact</label>
              <input type="text" id="soldContact" placeholder="0300-1234567">
            </div>
          </div>
          <div class="form-group">
            <label>Profit/Loss</label>
            <input type="text" id="profitLoss" placeholder="e.g., +10 Lac or -5 Lac">
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" rows="3" placeholder="Additional notes..."></textarea>
        </div>

        <div class="form-group">
          <label>Documents (URLs, comma separated)</label>
          <input type="text" id="documents" placeholder="https://example.com/doc1.pdf, https://example.com/doc2.pdf">
        </div>

        <div class="modal-actions">
          <button type="button" onclick="closeModal()" class="cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn">Save to Inventory</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../config/supabase.js"></script>
  <script src="js/auth-supabase.js"></script>
  <script src="js/inventory-supabase.js"></script>
</body>
</html>
