<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Emerald OAK Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-leaf"></i>
        <h2>Emerald OAK</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="properties.html" class="nav-item">
          <i class="fas fa-building"></i>
          <span>Properties</span>
        </a>
        <a href="projects.html" class="nav-item active">
          <i class="fas fa-hammer"></i>
          <span>Projects</span>
        </a>
        <a href="inventory.html" class="nav-item">
          <i class="fas fa-warehouse"></i>
          <span>Office Inventory</span>
        </a>
        <a href="inquiries.html" class="nav-item">
          <i class="fas fa-envelope"></i>
          <span>Inquiries</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>Projects Management</h1>
        <button onclick="openAddModal()" class="add-btn">
          <i class="fas fa-plus"></i>
          <span>Add Project</span>
        </button>
      </header>

      <div class="content-area">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Location</th>
                <th>Status</th>
                <th>Completion</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="projectsTable">
              <tr>
                <td colspan="6" class="no-data">No projects found</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="projectModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Project</h2>
        <button onclick="closeModal()" class="close-btn">&times;</button>
      </div>
      <form id="projectForm" class="modal-form">
        <input type="hidden" id="projectId">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="location" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status *</label>
            <select id="status" required>
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="planned">Planned</option>
            </select>
          </div>
          <div class="form-group">
            <label>Completion %</label>
            <input type="number" id="completion" min="0" max="100" value="0">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="image">
        </div>
        <div class="modal-actions">
          <button type="button" onclick="closeModal()" class="cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../config/supabase.js"></script>
  <script src="js/auth-supabase.js"></script>
  <script src="js/projects-supabase.js"></script>
</body>
</html>
