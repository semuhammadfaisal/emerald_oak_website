<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties - Emerald OAK Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-leaf"></i>
        <h2>Emerald OAK</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="properties.html" class="nav-item active">
          <i class="fas fa-building"></i>
          <span>Properties</span>
        </a>
        <a href="projects.html" class="nav-item">
          <i class="fas fa-hammer"></i>
          <span>Projects</span>
        </a>
        <a href="inventory.html" class="nav-item">
          <i class="fas fa-warehouse"></i>
          <span>Office Inventory</span>
        </a>
        <a href="inquiries.html" class="nav-item">
          <i class="fas fa-envelope"></i>
          <span>Inquiries</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>Properties Management</h1>
        <button onclick="openAddModal()" class="add-btn">
          <i class="fas fa-plus"></i>
          <span>Add Property</span>
        </button>
      </header>

      <div class="content-area">
        <div class="filters">
          <input type="text" id="searchInput" placeholder="Search properties..." class="search-input">
          <select id="statusFilter" class="filter-select">
            <option value="">All Status</option>
            <option value="available">Available</option>
            <option value="sold">Sold</option>
            <option value="pending">Pending</option>
          </select>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Location</th>
                <th>Type</th>
                <th>Size</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="propertiesTable">
              <tr>
                <td colspan="8" class="no-data">No properties found</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="propertyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Property</h2>
        <button onclick="closeModal()" class="close-btn">&times;</button>
      </div>
      <form id="propertyForm" class="modal-form">
        <input type="hidden" id="propertyId">
        <div class="form-row">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" id="title" required>
          </div>
          <div class="form-group">
            <label>Location *</label>
            <input type="text" id="location" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type *</label>
            <select id="type" required>
              <option value="">Select Type</option>
              <option value="house">House</option>
              <option value="plot">Plot</option>
              <option value="apartment">Apartment</option>
              <option value="commercial">Commercial</option>
            </select>
          </div>
          <div class="form-group">
            <label>Size *</label>
            <input type="text" id="size" placeholder="e.g., 7 Marla" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price *</label>
            <input type="text" id="price" placeholder="e.g., 1.5 Crore" required>
          </div>
          <div class="form-group">
            <label>Status *</label>
            <select id="status" required>
              <option value="available">Available</option>
              <option value="sold">Sold</option>
              <option value="pending">Pending</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Features (comma separated)</label>
          <input type="text" id="features" placeholder="e.g., 3 Bedrooms, 2 Bathrooms, Parking">
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="image" placeholder="Image path or URL">
        </div>
        <div class="modal-actions">
          <button type="button" onclick="closeModal()" class="cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn">Save Property</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../config/supabase.js"></script>
  <script src="js/auth-supabase.js"></script>
  <script src="js/properties-supabase.js"></script>
</body>
</html>
