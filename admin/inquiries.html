<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiries - Emerald OAK Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-leaf"></i>
        <h2>Emerald OAK</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="properties.html" class="nav-item">
          <i class="fas fa-building"></i>
          <span>Properties</span>
        </a>
        <a href="projects.html" class="nav-item">
          <i class="fas fa-hammer"></i>
          <span>Projects</span>
        </a>
        <a href="inventory.html" class="nav-item">
          <i class="fas fa-warehouse"></i>
          <span>Office Inventory</span>
        </a>
        <a href="inquiries.html" class="nav-item active">
          <i class="fas fa-envelope"></i>
          <span>Inquiries</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>Contact Inquiries</h1>
      </header>

      <div class="content-area">
        <div class="filters">
          <select id="statusFilter" class="filter-select" onchange="filterInquiries()">
            <option value="">All Status</option>
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="closed">Closed</option>
          </select>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Message</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inquiriesTable">
              <tr>
                <td colspan="7" class="no-data">No inquiries found</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- View Modal -->
  <div id="inquiryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Inquiry Details</h2>
        <button onclick="closeModal()" class="close-btn">&times;</button>
      </div>
      <div class="inquiry-details">
        <div class="detail-row">
          <strong>Name:</strong>
          <span id="detailName"></span>
        </div>
        <div class="detail-row">
          <strong>Email:</strong>
          <span id="detailEmail"></span>
        </div>
        <div class="detail-row">
          <strong>Phone:</strong>
          <span id="detailPhone"></span>
        </div>
        <div class="detail-row">
          <strong>Date:</strong>
          <span id="detailDate"></span>
        </div>
        <div class="detail-row">
          <strong>Message:</strong>
          <p id="detailMessage"></p>
        </div>
        <div class="detail-row">
          <strong>Status:</strong>
          <select id="detailStatus" onchange="updateInquiryStatus()">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="closed">Closed</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button onclick="closeModal()" class="cancel-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="../config/supabase.js"></script>
  <script src="js/auth-supabase.js"></script>
  <script src="js/inquiries-supabase.js"></script>
</body>
</html>
