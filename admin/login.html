<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Emerald OAK</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-shield-alt"></i>
        <h1>Emerald OAK Admin</h1>
        <p>Property Management System</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Email</label>
          <input type="email" id="username" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="login-btn">
          <span>Login</span>
          <i class="fas fa-arrow-right"></i>
        </button>
        <div id="errorMsg" class="error-msg"></div>
      </form>
    </div>
  </div>
  <script src="../config/supabase.js"></script>
  <script src="js/auth-supabase.js"></script>
</body>
</html>
